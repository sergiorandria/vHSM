<!DOCTYPE html>
<html>
<head>
    <title>Thesis Submission</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f6f9;
        }

        form {
            width: 450px;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);

            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        h2 {
            text-align: center;
        }

        input {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<form id="studentForm">

    <h2>Thesis Submission</h2>

    <input
        id="ThesisId"
        type="text"
        placeholder="Thesis ID"
        required
    />

    <input
        id="Grade"
        type="number"
        min="0"
        max="20"
        step="0.01"
        placeholder="Grade"
        required
    />

    <input
        id="Title"
        type="text"
        placeholder="Thesis Title"
        required
    />

    <input
        id="Date"
        type="date"
        required
    />

    <input
        id="Document"
        type="file"
        required
    />

    <button type="submit">
        Submit
    </button>

</form>

<script type="module" src="/src/main.ts"></script>

</body>
</html>
