<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f6f9;
        }

        form {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 350px;

            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 1rem;
        }

        input {
            padding: 0.8rem;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<form id="studentForm">
    <h2>Student Form</h2>

    <input id="name" type="text" placeholder="Name" required />
    <input id="email" type="email" placeholder="Email" required />
    <input id="grade" type="number" placeholder="Grade" required />

    <button type="submit">Submit</button>
</form>

<script src="app.js"></script>

</body>
</html>
