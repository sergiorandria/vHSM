<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thesis Submission</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f4f6f9;
            color: #1a1a1a;
            padding: 3rem 1.5rem;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .card {
            background: white;
            padding: 1.75rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
        }

        .card h2 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .card-header h2 {
            margin-bottom: 0;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #444;
        }

        input {
            padding: 0.7rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        button {
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #93b4f0;
            cursor: not-allowed;
        }

        button.secondary {
            background: white;
            color: #2563eb;
            border: 1px solid #2563eb;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        button.secondary:hover {
            background: #eff4ff;
        }

        .search-row {
            display: flex;
            gap: 0.75rem;
        }

        .search-row input {
            flex: 1;
        }

        .search-row button {
            flex-shrink: 0;
            padding: 0.7rem 1.25rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead th {
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #888;
            font-weight: 600;
            padding: 0.5rem 0.6rem;
            border-bottom: 1px solid #e5e5e5;
        }

        tbody td {
            padding: 0.65rem 0.6rem;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:hover {
            background: #fafbfc;
        }

        .empty-row td {
            text-align: center;
            color: #888;
            padding: 1.5rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge.notarized {
            background: #e3f7e9;
            color: #1a7a3d;
        }

        .badge.pending {
            background: #fdf3d9;
            color: #92650a;
        }

        .search-result {
            margin-top: 1rem;
        }

        .search-result pre {
            background: #f7f8fa;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.85rem;
            overflow-x: auto;
        }

        .error-text {
            color: #b3261e;
            font-size: 0.9rem;
        }

        .hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: -0.5rem;
        }

        .hidden {
            display: none !important;
        }

        .login-wrap {
            max-width: 380px;
            margin: 0 auto;
            width: 100%;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 900px;
            margin: 0 auto;
        }

        .topbar .who {
            font-size: 0.85rem;
            color: #555;
        }

        .topbar .who strong {
            color: #1a1a1a;
        }
    </style>
</head>
<body>

<main>

    <!-- Login gate: shown until a valid session exists -->
    <section class="card login-wrap" id="loginCard">
        <h2>Sign in</h2>
        <form id="loginForm">
            <div class="field">
                <label for="username">Username</label>
                <input id="username" type="text" autocomplete="username" required />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="current-password" required />
            </div>

            <p class="error-text" id="loginError"></p>

            <button type="submit" id="loginBtn">Sign in</button>
        </form>
    </section>

    <!-- App content: hidden until logged in -->
    <div id="appContent" class="hidden" style="display: flex; flex-direction: column; gap: 2rem;">

        <div class="topbar">
            <span class="who">Signed in as <strong id="currentUser"></strong></span>
            <button class="secondary" id="logoutBtn" type="button">Log out</button>
        </div>

        <section class="card">
            <h2>Submit a thesis</h2>
            <form id="studentForm">
                <div class="field">
                    <label for="ThesisId">Thesis ID</label>
                    <input id="ThesisId" type="text" placeholder="e.g. TH009" required />
                </div>

                <div class="field">
                    <label for="Grade">Grade</label>
                    <input id="Grade" type="number" min="0" max="20" step="0.01" placeholder="0–20" required />
                </div>

                <div class="field">
                    <label for="Title">Thesis title</label>
                    <input id="Title" type="text" placeholder="Full title of the thesis" required />
                </div>

                <div class="field">
                    <label for="Date">Defense date</label>
                    <input id="Date" type="date" required />
                </div>

                <div class="field">
                    <label for="Document">Document</label>
                    <input id="Document" type="file" required />
                    <p class="hint">PDF recommended, max 50 MB.</p>
                </div>

                <button type="submit" id="submitBtn">Submit</button>
            </form>
        </section>

        <section class="card">
            <div class="card-header">
                <h2>All theses</h2>
                <button class="secondary" id="refreshBtn" type="button">Refresh</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Defense date</th>
                        <th>Grade</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="thesesTableBody">
                    <tr class="empty-row"><td colspan="5">Loading…</td></tr>
                </tbody>
            </table>
        </section>

        <section class="card">
            <h2>Look up a thesis</h2>
            <form id="searchForm">
                <div class="search-row">
                    <input type="text" id="searchThesisId" placeholder="Thesis ID" required />
                    <button type="submit">Search</button>
                </div>
            </form>
            <div id="searchResult" class="search-result"></div>
        </section>

    </div>

</main>

<script type="module" src="/src/main.ts"></script>

</body>
</html>
