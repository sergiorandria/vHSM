# Docker Compose configuration for local development
# This compose file brings up a MinIO instance (S3-compatible object storage)
# and the API service that uses an HSM (SoftHSM) for encryption operations.
#
# Notes:
# - Replace the placeholder values {MINIO_ROOT_USER} and {MINIO_ROOT_PASSWORD}
#   with real credentials via environment substitution or by using a .env file.
# - The API service mounts a host directory containing SoftHSM token files so
#   the HSM state can persist between container restarts.

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # MinIO data API (S3-compatible)
      - "9001:9001"   # MinIO management console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}        # Root user for MinIO (replace at deploy time)
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}  # Root password for MinIO (replace at deploy time)
    volumes:
      - minio_data:/data              # Persist object storage data on a named Docker volume

    command: server /data --console-address ":9001"  # Start MinIO and expose the console on port 9001


  api-vhsm:
    build: .
    container_name: api-vhsm
    ports:
      - "8080:8080"  # Expose the Go API on host port 8080
    depends_on:
      - minio         # Ensure MinIO is started before the API
    volumes:
      - ./softhsm_tokens:/var/lib/softhsm/tokens # Mount host SoftHSM token directory into container

volumes:
  minio_data:
    # Named volume where MinIO will store object data. This keeps data between restarts.
    