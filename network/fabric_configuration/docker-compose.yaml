version: "3.8"

networks:
  fabric:
    name: fabric

services:
  peer0.misa.university.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.misa.university.com
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: fabric
      CORE_PEER_ID: peer0.misa.university.com
      CORE_PEER_ADDRESS: peer0.misa.university.com:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0.misa.university.com:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_LOCALMSPID: misaMSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
      CORE_PEER_TLS_ENABLED: true
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      ORDERER_CA: /etc/hyperledger/orderer/tls/ca.crt
      FABRIC_CFG_PATH: /etc/hyperledger/fabric
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.misa.university.com:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.misa.university.com:7051
      CORE_PEER_GOSSIP_USELEADERELECTION: "true"
      CORE_PEER_GOSSIP_ORGLEADER: "false"
      CORE_LEDGER_STATE_STATEDATABASE: goleveldb
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/misa.university.com/peers/peer0.misa.university.com/msp:/etc/hyperledger/fabric/msp:ro
      - ./crypto-config/peerOrganizations/misa.university.com/peers/peer0.misa.university.com/tls:/etc/hyperledger/fabric/tls:ro
      - ./crypto-config/ordererOrganizations/university.com/orderers/orderer.university.com/tls:/etc/hyperledger/orderer/tls:ro
      - ./channel-artifacts:/var/hyperledger/orderer/channel-artifacts:ro
      - ./peer-data/peer0.misa.university.com:/var/hyperledger/ledger
    ports:
      - "7051:7051"
    networks:
      - fabric
    depends_on:
      - orderer.university.com

  cli.misa.university.com:
    image: hyperledger/fabric-tools:2.5
    container_name: cli.misa.university.com
    tty: true
    stdin_open: true
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    environment:
      GOPATH: /opt/gopath
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: fabric
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: true
      CORE_PEER_LOCALMSPID: misaMSP
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/admin-msp
      CORE_PEER_ADDRESS: peer0.misa.university.com:7051
      ORDERER_CA: /etc/hyperledger/orderer/tls/ca.crt
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/misa.university.com/users/Admin@misa.university.com/msp:/etc/hyperledger/fabric/admin-msp:ro
      - ./crypto-config/peerOrganizations/misa.university.com/peers/peer0.misa.university.com/tls:/etc/hyperledger/fabric/tls:ro
      - ./crypto-config/ordererOrganizations/university.com/orderers/orderer.university.com/tls:/etc/hyperledger/orderer/tls:ro
      - ./channel-artifacts:/var/hyperledger/orderer/channel-artifacts
      - ./crypto-config:/etc/hyperledger/fabric/crypto-config:ro
    networks:
      - fabric
    depends_on:
      - orderer.university.com
      - peer0.misa.university.com
    extra_hosts:
      - "orderer.university.com:172.18.0.4"

  orderer.university.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.university.com
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/orderer
    environment:
      ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
      ORDERER_GENERAL_LISTENPORT: 7050
      ORDERER_GENERAL_LOCALMSPID: OrdererMSP
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_ENABLED: true
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_TLS_ROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
      ORDERER_GENERAL_BOOTSTRAPMETHOD: file
      ORDERER_GENERAL_BOOTSTRAPFILE: /var/hyperledger/orderer/channel-artifacts/genesis.block
      ORDERER_CHANNELPARTICIPATION_ENABLED: true
    volumes:
      - ./crypto-config/ordererOrganizations/university.com/orderers/orderer.university.com/msp:/var/hyperledger/orderer/msp:ro
      - ./crypto-config/ordererOrganizations/university.com/orderers/orderer.university.com/tls:/var/hyperledger/orderer/tls:ro
      - ./channel-artifacts:/var/hyperledger/orderer/channel-artifacts
      - orderer.university.com:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
    networks:
      - fabric

volumes:
  peer0.misa.university.com:
  orderer.university.com:
