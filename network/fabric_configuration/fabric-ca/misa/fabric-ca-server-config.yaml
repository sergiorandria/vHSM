version: 1.5.13
port: 8054
debug: false
crlsizelimit: 512000

tls:
  enabled: false

ca:
  name: ca-misa

crl:
  expiry: 24h

registry:
  maxenrollments: -1
  identities:
    - name: admin
      pass: adminpw
      type: client
      affiliation: ""
      attrs:
        hf.Registrar.Roles: "*"
        hf.Registrar.DelegateRoles: "*"
        hf.Revoker: true
        hf.IntermediateCA: true
        hf.GenCRL: true
        hf.Registrar.Attributes: "*"
        hf.AffiliationMgr: true

db:
  type: postgres
  datasource: "host=postgres.misa port=5432 user=fabricca password=fabriccapw dbname=fabric_ca_misa sslmode=disable"
  tls:
    enabled: false

# --------------------------------------------------------------------
# Intégration LDAP (annuaire visible dans le schéma d'architecture)
# --------------------------------------------------------------------
# Désactivée par défaut : PostgreSQL reste le "registry" faisant autorité
# pour le register/enroll de Fabric-CA (c'est ce qui garantit que le type
# d'identité - peer/orderer/admin/client - est correctement gravé dans le
# certificat pour les NodeOUs). Un annuaire LDAP est démarré séparément et
# rempli par ./generate-ldap-identities.sh (groupes RBAC applicatifs +
# utilisateurs), pour un usage applicatif (SSO, lookup d'identité,
# contrôles d'accès dans vhsmd), conformément au schéma d'architecture
# Fabric-CA fourni.
#
# Pour faire de LDAP le registre d'authentification de la CA elle-même
# (comme le permet Fabric-CA nativement), décommentez le bloc ci-dessous.
# Attention : dans ce mode, "register" n'est plus utilisé (les identités
# doivent déjà exister dans LDAP) et vous perdez l'auto-provisioning du
# "type" d'identité utilisé par NodeOUs sans configuration additionnelle
# des "converters" LDAP -> attributs Fabric-CA (hf.*).
#
# ldap:
#   enabled: true
#   url: ldap://cn=admin,dc=misa,dc=university,dc=com:ldapadminpw@ldap.misa:389/dc=misa,dc=university,dc=com
#   userfilter: (uid=%s)
#   attribute:
#     names: ['uid','businessCategory']
#     converters:
#       - name: hf.Registrar.Roles
#         value: attr("businessCategory")

affiliations:
  misa:
    - department1
    - department2

signing:
  default:
    usage:
      - digital signature
    expiry: 8760h
  profiles:
    ca:
      usage:
        - cert sign
        - crl sign
      caconstraint:
        isca: true
        maxpathlen: 0
      expiry: 43800h
    tls:
      usage:
        - signing
        - key encipherment
        - server auth
        - client auth
        - key agreement
      expiry: 8760h

csr:
  cn: ca-misa
  keyrequest:
    algo: ecdsa
    size: 256
  names:
    - C: FR
      ST: "N/A"
      L: "N/A"
      O: misa
      OU: Fabric-CA
  hosts:
    - ca.misa
    - localhost
  ca:
    expiry: 131400h
    pathlength: 1

operations:
  listenAddress: 0.0.0.0:18054
  tls:
    enabled: false
